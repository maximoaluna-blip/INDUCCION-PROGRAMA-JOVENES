name: Pruebas E2E (Playwright)

# Corre la suite en cada push/PR a main: recompila los cursos, los sirve localmente
# y valida smoke, enlaces, accesibilidad (axe), responsive, persistencia y el flujo E2E
# del alumno (con backend interceptado, sin escribir en ningun Sheet).
# Tambien se puede lanzar a mano desde la pestaña Actions.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: PRUEBAS-E2E/package-lock.json

      - name: Instalar dependencias
        working-directory: PRUEBAS-E2E
        run: npm ci

      - name: Instalar navegador Playwright
        working-directory: PRUEBAS-E2E
        run: npx playwright install --with-deps chromium

      - name: Recompilar cursos
        working-directory: 05-Generador-Cursos
        run: |
          for c in bienvenida-programa-jovenes educacion-por-el-amor como-se-educa-hoy caracteristicas-esenciales-movimiento-scout metodo-scout-8-elementos pnpj-gran-juego-para-la-vida mi-compromiso-programa-jovenes rama-manada-lobatos; do
            node build-course.js "$c"
          done

      - name: Servir build + correr suite
        working-directory: PRUEBAS-E2E
        env:
          ASC_BASE_URL: http://localhost:8099/02-Plataforma-Web/
        run: |
          python3 -m http.server 8099 --directory "$GITHUB_WORKSPACE" >/tmp/srv.log 2>&1 &
          SRV=$!
          for i in $(seq 1 15); do
            curl -sf -o /dev/null "http://localhost:8099/02-Plataforma-Web/bienvenida-programa-jovenes.html" && break
            sleep 1
          done
          set +e
          npx playwright test --reporter=list
          CODE=$?
          kill $SRV 2>/dev/null
          exit $CODE

      - name: Subir reporte (si falla)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: PRUEBAS-E2E/playwright-report
          retention-days: 14
